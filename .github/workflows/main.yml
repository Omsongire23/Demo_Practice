name: Build
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: mkdir -p dist && echo "build output" > dist/app.txt
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
